<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="wenderly.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />
    <script src="app.js" defer></script>
  </head>
  <body>
    <div class="overlay"></div>
    <nav >
      <div id="wenderly_Title">
        <i class="fa-solid fa-plane"></i><span>wenderly</span>
      </div>
      <div id="page_list">
        <a href="index.html#Home_Page">home</a>
        <a href="index.html#About_Us">about</a>
        <a href="index.html#Explore_Page">explore</a>
        <a href="contact.html">contact</a>
        <a href="login.html">login</a>
      </div>
      <button id="mobile_taggole" title="Menu" onclick="showMobileMenu()">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </nav>

    <div class="mobile_page_list">
      <a href="index.html#Home_Page">home</a>
      <a href="index.html#About_Us">about</a>
      <a href="index.html#Explore_Page">explore</a>
      <a href="contact.html">contact</a>
      <a href="login.html">login</a>
    </div>

    <div class="signup_page">
      <div class="signup_text">
        <h1>welcome Create your Travel Account </h1>
        <p>Expolre destinations, Book trips and manage all</p>
        <p>your journeys in one place , with us and explore the world.</p>
      </div>
      <form action="" id="signup_form">
        <h2>Sign Up</h2>
        <p>Sign up your credentils to access your account.</p>

        <label for="Full_name">
          <p>Full name</p>
          <input type="text" placeholder="enter your Full name" id="Full_name" class="signup_form_input" />
          <h6 class="errorMSG"></h6>
        </label>

        <label for="signup_email">
          <p>email address</p>
          <input type="email" placeholder="enter your email" id="signup_email" class="signup_form_input"/>
          <h6 class="errorMSG"></h6>
        </label>
        <label for="signup_pass">
          <p>password</p>
          <input
            type="password"
            placeholder="enter your password"
            id="signup_pass"
            class="signup_form_input"
            minlength="8"
          />
          <h6 class="errorMSG"></h6>
        </label>

        <label for="signup_confirm_pass">
          <p>confirm password</p>
          <input
            type="password"
            placeholder="Confirm password"
            id="signup_confirm_pass"
            class="signup_form_input"
          />
          <h6 class="errorMSG"></h6>
        </label>

        <label for="signup_checkbox" class="signup_checkbox">
          <input type="checkbox" id="signup_terms"/>
          <span>terms & privacy </span>
          <h6 class="errorMSG"></h6>
        </label>

        <button type="submit" id="signup_sub_btn">Create Account</button>

        <label style="text-align: center"
          >Already have an account?
          <span><a href="login.html" style="color: rgb(0, 13, 255)">sign In</a></span></label
        >
      </form>
    </div>
    <img src="https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&w=1600&q=80" style="position: fixed; top: 70px; z-index: -1; width: 100%; height: 100%; object-fit: cover;"/>
  </body>
</html>
